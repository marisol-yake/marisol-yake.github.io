project: 
  type: website
  
website: 
  page-navigation: true
  title: "Marisol Yake" 
  site-url: "https://marisol-yake.github.io/" 
  repo-url: https://github.com/marisol-yake/marisol-yake.github.io
  repo-actions: [issue]
  
  page-footer:
    right: "Marisol built this website with ❤️ and [Quarto](https://quarto.org/)."
    left: "Forked from: &copy; CC-By Openscapes, 2024"
    
  sidebar:
    logo: "images/openscapes_hex.png"
    pinned: true
    align: center
    tools:
      - icon: github
        href: https://github.com/marisol-yake
        text: "My Github Profile"
      - icon: linkedin
        href: https://www.linkedin.com/in/marisol-yake/
        text: "My LinkedIn Profile"         

    style: "docked"
    search: true
    collapse-level: 1
    contents:
      - href: index.qmd
        text: Home
      - about.qmd
      - section: blog-posts/index.qmd
        contents:
          - blog-posts/test-post1.qmd
          - blog-posts/test-post2.qmd
          - blog-posts/test-post3.qmd
      - section: public-resources/index.qmd
        contents:
          - public-resources/Aurora.qmd
          - public-resources/Denver.qmd
      - learning-more.qmd
      - href: transition-from-rmarkdown.qmd
        text: Transition from Rmd
      - support-this.qmd


format:
  html:
    theme:
      light: flatly
      dark: darkly
    code-copy: true
    code-overflow: wrap
    toc: true


filters:
  - include-files.lua
  - quarto

  
